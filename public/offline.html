<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#159957" />
    <title>离线模式 | db-manager</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #102018;
      }

      main {
        width: min(92vw, 420px);
        padding: 32px;
        border: 1px solid #dce7e1;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 42px rgb(15 23 42 / 0.08);
      }

      .mark {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        margin-bottom: 20px;
        border-radius: 8px;
        background: #159957;
        color: #ffffff;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 22px;
        color: #52635b;
        line-height: 1.65;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: #159957;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #edf7f1;
        }

        main {
          background: #16231d;
          border-color: #263d33;
          box-shadow: none;
        }

        p {
          color: #a8bbb1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">DB</div>
      <h1>当前处于离线状态</h1>
      <p>已缓存的页面仍可继续访问；数据库、邮件和发布接口会在网络恢复后重新连接。</p>
      <button type="button" onclick="window.location.reload()">重新加载</button>
    </main>
  </body>
</html>
